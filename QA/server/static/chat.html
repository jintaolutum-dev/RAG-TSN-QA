<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>企业知识库问答</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, sans-serif; }
    body { display: flex; height: 100vh; background: #f5f7fa; }

    /* 左侧知识库列表 */
    #sidebar {
      width: 220px; background: #fff; border-right: 1px solid #e4e7ed;
      display: flex; flex-direction: column; padding: 16px;
    }
    #sidebar h3 { font-size: 14px; color: #909399; margin-bottom: 12px; }
    .kb-item {
      padding: 10px 12px; border-radius: 8px; cursor: pointer;
      font-size: 14px; margin-bottom: 6px; color: #303133;
      transition: background 0.2s;
    }
    .kb-item:hover { background: #f0f2f5; }
    .kb-item.active { background: #ecf5ff; color: #409eff; font-weight: bold; }
    .kb-count { font-size: 12px; color: #909399; margin-left: 4px; }

    /* 右侧对话区 */
    #main { flex: 1; display: flex; flex-direction: column; }
    #header {
      padding: 14px 20px; background: #fff; border-bottom: 1px solid #e4e7ed;
      font-size: 16px; font-weight: bold; color: #303133;
    }
    #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }

    /* 消息气泡 */
    .msg { display: flex; gap: 10px; max-width: 80%; }
    .msg.user { align-self: flex-end; flex-direction: row-reverse; }
    .avatar {
      width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
    }
    .avatar.ai { background: #67c23a; color: #fff; }
    .avatar.user { background: #409eff; color: #fff; }
    .bubble {
      padding: 10px 14px; border-radius: 12px; line-height: 1.6;
      font-size: 14px; white-space: pre-wrap; word-break: break-word;
    }
    .msg.user .bubble { background: #409eff; color: #fff; border-radius: 12px 2px 12px 12px; }
    .msg.ai .bubble { background: #fff; border: 1px solid #e4e7ed; border-radius: 2px 12px 12px 12px; }
    .sources { margin-top: 8px; font-size: 12px; color: #909399; }

    /* 底部输入框 */
    #input-area {
      padding: 16px 20px; background: #fff; border-top: 1px solid #e4e7ed;
      display: flex; gap: 10px; align-items: flex-end;
    }
    #input-area textarea {
      flex: 1; border: 1px solid #dcdfe6; border-radius: 8px; padding: 10px 14px;
      font-size: 14px; resize: none; outline: none; line-height: 1.5;
      transition: border 0.2s; font-family: inherit;
    }
    #input-area textarea:focus { border-color: #409eff; }
    #send-btn {
      padding: 10px 22px; background: #409eff; color: #fff; border: none;
      border-radius: 8px; cursor: pointer; font-size: 14px; height: 42px;
      transition: background 0.2s;
    }
    #send-btn:hover { background: #66b1ff; }
    #send-btn:disabled { background: #a0cfff; cursor: not-allowed; }
    #status { padding: 6px 20px; font-size: 12px; color: #909399; background: #fff; }
  </style>
</head>
<body>

<div id="sidebar">
  <h3>知识库</h3>
  <div id="kb-list"><span style="color:#c0c4cc;font-size:13px">加载中...</span></div>
</div>

<div id="main">
  <div id="header">💬 企业知识库智能问答</div>
  <div id="messages">
    <div class="msg ai">
      <div class="avatar ai">🤖</div>
      <div class="bubble">你好！请从左侧选择知识库，然后输入问题，我来帮你查找答案。</div>
    </div>
  </div>
  <div id="status"></div>
  <div id="input-area">
    <textarea id="question" rows="2" placeholder="输入问题，按 Enter 发送..." disabled></textarea>
    <button id="send-btn" disabled>发送</button>
  </div>
</div>

<script>
  const API = 'http://localhost:5000/api'
  let token = ''
  let currentKbId = null

  // ① 自动登录
  async function autoLogin() {
    setStatus('正在连接...')
    const res = await fetch(`${API}/auth/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: 'admin', password: '123456' })
    })
    const data = await res.json()
    token = data.data.token
    setStatus('已连接')
    await loadKBList()
  }

  // ② 加载知识库列表
  async function loadKBList() {
    const res = await fetch(`${API}/knowledge_base/list`, {
      headers: { Authorization: token }
    })
    const data = await res.json()
    const list = data.data?.list || data.data || []
    const container = document.getElementById('kb-list')
    container.innerHTML = ''
    list.forEach(kb => {
      const el = document.createElement('div')
      el.className = 'kb-item'
      el.innerHTML = `📁 ${kb.kb_name} <span class="kb-count">${kb.doc_count}篇</span>`
      el.onclick = () => selectKB(kb, el)
      container.appendChild(el)
      // 自动选中第一个
      if (!currentKbId) selectKB(kb, el)
    })
  }

  // ③ 选择知识库
  function selectKB(kb, el) {
    currentKbId = kb.id
    document.querySelectorAll('.kb-item').forEach(e => e.classList.remove('active'))
    el.classList.add('active')
    document.getElementById('header').textContent = `💬 ${kb.kb_name}`
    document.getElementById('question').disabled = false
    document.getElementById('send-btn').disabled = false
    document.getElementById('question').placeholder = `向「${kb.kb_name}」提问...`
  }

  // ④ 发送问题
  async function sendQuestion() {
    const q = document.getElementById('question').value.trim()
    if (!q || !currentKbId) return
    appendMsg('user', q)
    document.getElementById('question').value = ''
    document.getElementById('send-btn').disabled = true
    setStatus('AI 思考中...')

    const thinkingEl = appendMsg('ai', '⏳ 正在检索知识库...')
    try {
      const res = await fetch(`${API}/chat/ask`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', Authorization: token },
        body: JSON.stringify({ question: q, kb_id: currentKbId })
      })
      const data = await res.json()
      const answer = data.data?.answer || '抱歉，未获取到回答'
      const sources = data.data?.source_docs || []
      let sourceText = ''
      if (sources.length > 0) {
        sourceText = '\n\n📎 来源：' + sources.map(s => s.file_name).join('、')
      }
      thinkingEl.querySelector('.bubble').textContent = answer + sourceText
    } catch (e) {
      thinkingEl.querySelector('.bubble').textContent = '请求失败，请检查后端是否正常运行'
    }
    setStatus('')
    document.getElementById('send-btn').disabled = false
  }

  function appendMsg(role, text) {
    const msgs = document.getElementById('messages')
    const div = document.createElement('div')
    div.className = `msg ${role}`
    div.innerHTML = `
      <div class="avatar ${role}">${role === 'ai' ? '🤖' : '👤'}</div>
      <div class="bubble">${text}</div>
    `
    msgs.appendChild(div)
    msgs.scrollTop = msgs.scrollHeight
    return div
  }

  function setStatus(msg) {
    document.getElementById('status').textContent = msg
  }

  // Enter 发送，Shift+Enter 换行
  document.getElementById('question').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendQuestion() }
  })
  document.getElementById('send-btn').onclick = sendQuestion

  // 启动
  autoLogin()
</script>
</body>
</html>
